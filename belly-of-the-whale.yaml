title: Belly of the Whale
style: 'shoegaze, indie rock, dreampop, 85 BPM hypnotic half-time feel, washed-out distorted guitars drenched
  in spring reverb and tape delay, slow driving bass in minor, soft fuzzy kick, shimmer of cymbal brushes,
  sparse breathy male vocals buried deep in reverb so the words just hint at themselves, atmospheric pads,
  melancholic, submerged cathedral acoustics, My Bloody Valentine meets Slowdive meets Have a Nice Life.
  A hypnotic nocturnal track that never lifts above a murmur but steadily builds mass; ends on a long
  droning feedback wash.

  '
lyrics: '[Intro]

  (droning guitars swell from silence, heavy reverb, slow tape delay)


  [Verse]

  Saw you standing on the shore,

  where the water met the sky.

  You said come and see me,

  there is nothing left to try.


  [Chorus]

  Belly of the whale,

  swallow me whole.

  Take me to the dark,

  show me the hole.


  [Verse 2]

  (whispered, almost spoken)

  Down I go into the deep,

  where the oldest secrets sleep.


  [Chorus]

  Belly of the whale,

  make me small.

  Take me to the silence,

  answer to the call.


  [Outro]

  (guitar feedback washes out over a deep bass drone)

  '
