title: Peripheral
style: 'dreampop ambient electronic, 82 BPM hypnotic half-time feel, slow pulsing analog synth pad in
  fifths drifting through a long tape-delay reverb, warm round sub bass holding root tones with occasional
  slow glissandi, brushed kit entering softly halfway through with a shuffled hat pattern and dampened
  rimshots, chorused and reverbed electric piano arpeggios cascading in the second half, bowed glass and
  singing-bowl bell-like accents shimmering in the stereo field, female vocalise floating wordlessly as
  a pad-layer, close-miked male voice almost whispered with a long pre-delay plate reverb so each word
  trails into the next, field recordings woven in (pages fluttering, a distant train horn submerged in
  water, muffled conversation through a wall, water dripping in an empty hall, an old CRT static hiss),
  heavy tape saturation, vinyl crackle, occasional bit-crushed vocal stutter as a rhythmic element, the
  whole mix submerged and dreamlike, never louder than a murmur, ends on a sustained droning chord that
  dissolves into tape hiss and a single soft door click. Slowly rotating, never landing. The sound of
  being between rooms.

  '
lyrics: '[Intro]

  (long pad swell, tape hiss, distant water dripping in an empty hall)


  [Verse]

  I am walking through a library of pages

  written in a handwriting that is almost mine.

  Every book has my name on the spine

  and a language I cannot quite remember.


  [Verse]

  There is a staircase that keeps returning me

  to the room I left an hour ago.

  There is an animal on the landing

  that is part corgi and part whale.


  [Chorus]

  In the peripheral, in the peripheral,

  the faces only resolve when I look away,

  in the peripheral, in the peripheral,

  somebody typing words I have not thought.


  [Verse 2]

  A clock on the wall reads the time I''m asking,

  a pen on the desk is writing ahead of me.

  The monitors are all displaying different versions

  of the same grey corridor I keep arriving in.


  [Bridge]

  (bit-crushed stutter, vocal shatters briefly, a door opens onto water)

  I dream I am reading,

  I read that I am dreaming,

  I am the handwriting and the hand.


  [Chorus]

  In the peripheral, in the peripheral,

  the faces only resolve when I look away,

  in the peripheral, in the peripheral,

  somebody typing words I have not thought.


  [Outro]

  (droning chord holds, field recordings surface once more — train horn underwater, pages fluttering —
  a door clicks softly, silence)

  '
