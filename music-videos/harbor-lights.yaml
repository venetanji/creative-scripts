title: Harbor Lights
style: 'folk noir, coastal Americana, slow 72 BPM, fingerpicked acoustic guitar, bowed upright bass, brushed
  snare kept soft, distant foghorn and gentle harbour waves as field recording, weathered male vocal with
  a world-weary baritone, close-mic room reverb, minor pentatonic melody, mournful tone, tape hiss texture,
  a restrained string swell lifting the chorus.

  '
lyrics: '[Intro]

  (soft fingerpicking, foghorn in the distance)


  [Verse]

  Morning breaks over the empty quay,

  and the fog rolls in like it''s here to stay.

  An old dog walks where the boats should be,

  keeping the watch that no one asked him to keep.


  [Chorus]

  Harbour lights, harbour lights,

  the quiet stars of the coastal night,

  they hold the world in their steady sight,

  and keep us honest, harbour lights.


  [Verse 2]

  A tin lamp swings where the rope is frayed,

  and a gull describes the arc of a prayer.


  [Outro]

  (fade into wind and tape hiss)

  '
video:
  fps: 24
  resolution:
  - 1024
  - 576
  negative: pc game, cartoon, cgi, modern tech, text, watermark, ugly, distorted, still frame, flat lighting
  crossfade: 0.5
  camera_lora_strength: 0.7
anchor_image: anchor.png
scenes:
- label: intro_harbor
  start_sec: 0
  duration_sec: 10
  camera_lora: static
  anchor:
    prompt: 'A wide cinematic photograph of a fog-shrouded fishing harbour at dawn, grey light pushing
      through low mist, dark silhouettes of idle fishing boats rocking gently against weathered pilings,
      warm incandescent dock lamps glowing in slate-blue fog, a single gull mid-drift in the middle distance.
      Folk-noir palette: muted slate, rust, and warm amber. Cinematic film grain, shallow depth of field
      on the nearest piling.

      '
  prompt: 'The camera holds static at a low angle on a fog-shrouded harbour at dawn while wisps of fog
    roll slowly from right to left across the frame. Idle fishing boats rock almost imperceptibly against
    weathered pilings. Cinematic, desaturated slate palette, soft dock-lamp glow. Ambient audio carries
    soft lapping water, a distant foghorn, faint rigging creaks.

    '
