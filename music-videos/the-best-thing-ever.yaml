# Music-video project: "The Best Thing Ever" — 1976 Italian variety-show pastiche.
# Source song: https://suno.com/song/8c6c32d8-5092-42df-93e2-476100edc440
# Watch the finished video: https://youtu.be/QNU6dc4j6i4
#
# To render this yourself, place these files alongside this yaml first:
#   song.mp3                          — the audio (download from the Suno link above,
#                                       or copy from your own Suno project)
#   operator.png                      — the protagonist's portrait (any front-facing photo;
#                                       this is the i2i identity reference for every scene)
#   sheets/studio_main_stage.png      — pre-rendered with `comfy_graph.py t2i`; prompt
#                                       text lives in the show_open scene's anchor block
#   sheets/studio_bstage.png          — pre-rendered; prompt in the bridge_a scene
#   sheets/featured_singer.png        — pre-rendered; prompt in v2_eyecontact / final_duet
#
# Then run end-to-end:
#   music_video.py anchors    the-best-thing-ever.yaml   # flux2 i2i/i2i2/i2iN anchors per scene
#   music_video.py scenes     the-best-thing-ever.yaml   # LTX-2.3 ia2v × 26 clips (~3 hrs)
#   music_video.py assemble   the-best-thing-ever.yaml   # ffmpeg concat + clean audio overlay
#
# Suno step is disabled (suno.runs: 0) — the song already exists. Set it to >=1
# if you want suno-mcp to generate fresh variants of the song from the style + lyrics
# below.

title: "The Best Thing Ever"

# Producer brief (rough — refine if you want to re-run suno).
