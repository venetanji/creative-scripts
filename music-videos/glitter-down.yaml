title: Glitter Down
style: 'classic 70s disco, four-on-the-floor kick, soaring string section with stabs, funky wah rhythm
  guitar, syncopated slap-bass, hi-hat sixteenths, tight horn stab section, male falsetto lead with doubled
  female backing, clap on 2 and 4, 120 BPM, warm analog Rhodes, tambourine, mirrorball peak-hour euphoric
  feel.

  '
lyrics: '[Verse]

  Seven on the clock and the line''s around the block,

  dress code is whatever you brought.

  I put on the shoes I swore I wouldn''t wear,

  doorman says honey come right through here.


  [Pre-Chorus]

  I came in tired, I came in slow,

  by the second verse I''m gonna let it go.


  [Chorus]

  Glitter down, glitter down,

  rain like this don''t fall on any other town.

  Glitter down, glitter down,

  put your sorrow on the ground.

  '
